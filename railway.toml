[build]
builder = "NIXPACKS"

[phases.setup]
nixPkgs = [
    "python311",
    "gcc",
    "nss",
    "nspr",
    "dbus",
    "atk",
    "at-spi2-atk",
    "cups",
    "libxkbcommon",
    "libxcomposite",
    "libxdamage",
    "libxrandr",
    "libgbm",
    "pango",
    "cairo",
    "alsa-lib",
    "libxshmfence",
    "fontconfig",
]

[phases.build]
cmds = [
    "python -m playwright install chromium",
]

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
