<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Telegram Ads CRM{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col">
      <div class="p-6 border-b border-gray-800">
        <h1 class="text-xl font-bold">Telegram Ads CRM</h1>
        <p class="text-xs text-gray-400 mt-1">Quản lý quảng cáo & bán nhóm tín hiệu</p>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
          <span>Dashboard</span>
        </a>
        <a href="/campaigns" class="nav-link {% if request.url.path == '/campaigns' %}active{% endif %}">
          <span>Chiến dịch quảng cáo</span>
        </a>
        <a href="/channels" class="nav-link {% if request.url.path == '/channels' %}active{% endif %}">
          <span>Channel Telegram</span>
        </a>
        <a href="/sales" class="nav-link {% if request.url.path == '/sales' %}active{% endif %}">
          <span>Doanh thu bán nhóm</span>
        </a>
        <a href="/employees" class="nav-link {% if request.url.path == '/employees' %}active{% endif %}">
          <span>Nhân viên</span>
        </a>
        <a href="/leaderboard" class="nav-link {% if request.url.path == '/leaderboard' %}active{% endif %}">
          <span>Bảng xếp hạng</span>
        </a>
        <a href="/import" class="nav-link {% if request.url.path == '/import' %}active{% endif %}">
          <span>Import dữ liệu</span>
        </a>
      </nav>
      <div class="p-4 border-t border-gray-800 text-xs text-gray-500">
        v1.0 · Custom CRM
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col">
      <header class="bg-white shadow-sm border-b border-gray-200 px-8 py-4">
        <h2 class="text-lg font-semibold text-gray-800">{% block header %}Dashboard{% endblock %}</h2>
      </header>
      <div class="flex-1 p-8 overflow-auto">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
